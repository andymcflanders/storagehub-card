search:
  name: Search Inventory
  description: Search for items in your StorageHub inventory
  fields:
    query:
      name: Search Query
      description: Text to search for (item names, descriptions, tags)
      required: true
      example: "winter jacket"
      selector:
        text:
    limit:
      name: Maximum Results
      description: Maximum number of results to return (1-50)
      default: 10
      selector:
        number:
          min: 1
          max: 50
          mode: box

get_container:
  name: Get Container by QR Code
  description: Look up a container by its QR code (useful for NFC tag automations)
  fields:
    qr_code:
      name: QR Code
      description: The QR code value printed on the container label
      required: true
      example: "SH-ABC123"
      selector:
        text:

refresh:
  name: Refresh Data
  description: Force an immediate refresh of StorageHub data
